<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Viajes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <h1>✈️ Mi Presupuesto de Viaje</h1>
    
    <div class="input-section">
        <label for="limit">Presupuesto Máximo:</label>
        <input type="number" id="limit" value="500000">
        <small style="color: #666;">* El presupuesto mínimo debe ser 500,000</small>
        
        <hr>

        <input type="text" id="item" placeholder="Concepto (ej: Hotel)">
        <input type="number" id="amount" placeholder="Costo ($)">
        <button id="addBtn">Agregar Gasto</button>
    </div>

    <div class="results-section">
        <h3>Desglose de Gastos:</h3>
        <div id="listContainer">
            <p>No hay gastos registrados aún.</p>
        </div>
        
        <div id="summary"></div>
        
        <button id="resetBtn" class="secondary">Reiniciar Todo</button>
    </div>
</div>        


    <script src="script.js"></script>
</body>
</html>
